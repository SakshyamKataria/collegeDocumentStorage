services:

  gateway-server:
    build: ./gateway-server
    container_name: distridoc-gateway
    ports:
      - "5000:5000"

    environment:
      - PORT=5000
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - MONGO_URI=${MONGO_URI_GATEWAY}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - STORAGE_NODE_1=http://storage-node-1:5001
      - STORAGE_NODE_2=http://storage-node-2:5002
      - CORS_ORIGIN=*
      - SERVICE_SECRET=${SERVICE_SECRET}

    networks:
      - distridoc-net

  storage-node-1:
    build: ./storage-node-1
    container_name: distridoc-node-1

    ports:
      - "5001:5001"

    environment:
      - PORT=5001
      - NODE_ID=storage-node-1
      - MONGO_URI=${MONGO_URI_NODE1}
      - REDIS_URL=${REDIS_URL}
      - GATEWAY_URL=http://gateway-server:5000
      - PEER_NODE_URL=http://storage-node-2:5002
      - PEER_NODE_ID=storage-node-2
      - SELF_URL=http://storage-node-1:5001
      - SERVICE_SECRET=${SERVICE_SECRET}

    volumes:
      - node1-uploads:/app/uploads

    networks:
      - distridoc-net

  storage-node-2:
    build: ./storage-node-2
    container_name: distridoc-node-2

    ports:
      - "5002:5002"

    environment:
      - PORT=5002
      - NODE_ID=storage-node-2
      - MONGO_URI=${MONGO_URI_NODE2}
      - REDIS_URL=${REDIS_URL}
      - GATEWAY_URL=http://gateway-server:5000
      - PEER_NODE_URL=http://storage-node-1:5001
      - PEER_NODE_ID=storage-node-1
      - SELF_URL=http://storage-node-2:5002
      - SERVICE_SECRET=${SERVICE_SECRET}

    volumes:
      - node2-uploads:/app/uploads

    networks:
      - distridoc-net

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
        - VITE_SOCKET_URL=http://localhost:5000

    container_name: distridoc-frontend

    ports:
      - "3000:80"

    depends_on:
      - gateway-server

    networks:
      - distridoc-net

networks:
  distridoc-net:
    driver: bridge

volumes:
  node1-uploads:
  node2-uploads: